<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Details - EliteStore</title>

  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    /* ================= HEADER ================= */

    .product-page-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 15px 7%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.14);
    }

    .product-logo {
      color: #ffffff;
      text-decoration: none;
      font-size: 27px;
      font-weight: 900;
    }

    .product-logo span {
      color: #fbbf24;
    }

    .product-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .product-nav a {
      position: relative;
      padding: 10px 16px;
      border-radius: 10px;
      background: #fbbf24;
      color: #111827;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      transition: 0.25s;
    }

    .product-nav a:hover {
      background: #ffffff;
      transform: translateY(-2px);
    }

    .cart-count-badge {
      min-width: 21px;
      height: 21px;
      padding: 0 6px;
      position: absolute;
      top: -9px;
      right: -9px;
      border-radius: 20px;
      background: #ef4444;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
    }

    /* ================= PRODUCT PAGE ================= */

    .product-page {
      max-width: 1250px;
      min-height: calc(100vh - 80px);
      margin: auto;
      padding: 30px 25px 60px;
    }

    .breadcrumb {
      margin-bottom: 22px;
      color: #6b7280;
      font-size: 14px;
    }

    .breadcrumb a {
      color: #d97706;
      text-decoration: none;
      font-weight: 800;
    }

    .product-detail-card {
      padding: 35px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(380px, 1fr);
      gap: 45px;
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 12px 38px rgba(17, 24, 39, 0.09);
    }

    .product-gallery,
    .product-detail-info {
      min-width: 0;
    }

    /* ================= PRODUCT IMAGE ================= */

    .main-image-box {
      width: 100%;
      height: 480px;
      position: relative;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image-box img {
      width: 100%;
      height: 100%;
      padding: 22px;
      object-fit: contain;
      transition: 0.35s;
    }

    .main-image-box:hover img {
      transform: scale(1.08);
    }

    .discount-badge-detail {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 5;
      padding: 7px 13px;
      border-radius: 30px;
      background: #ef4444;
      color: #ffffff;
      font-size: 13px;
      font-weight: 900;
    }

    .thumbnail-list {
      margin-top: 15px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
    }

    .thumbnail-button {
      width: 78px;
      height: 78px;
      padding: 5px;
      flex: 0 0 78px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      cursor: pointer;
    }

    .thumbnail-button:hover,
    .thumbnail-button.active {
      border-color: #f59e0b;
    }

    .thumbnail-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ================= PRODUCT INFORMATION ================= */

    .product-category {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-radius: 30px;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .product-detail-info h1 {
      margin: 0 0 14px;
      font-size: 37px;
      line-height: 1.2;
    }

    .rating-row,
    .price-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .rating-row {
      margin-bottom: 20px;
    }

    .rating-stars {
      color: #f59e0b;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .rating-count {
      color: #6b7280;
      font-size: 14px;
    }

    .price-section {
      margin-bottom: 18px;
    }

    .current-price {
      color: #16a34a;
      font-size: 32px;
      font-weight: 900;
    }

    .old-price-detail {
      color: #9ca3af;
      font-size: 19px;
      text-decoration: line-through;
    }

    .saving-text {
      color: #dc2626;
      font-size: 14px;
      font-weight: 900;
    }

    .tax-text {
      margin: -7px 0 22px;
      color: #6b7280;
      font-size: 13px;
    }

    .product-description {
      margin-bottom: 22px;
      color: #4b5563;
      line-height: 1.75;
    }

    .product-benefits {
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .benefit-box {
      padding: 13px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 13px;
      font-weight: 800;
    }

    .stock-row {
      margin-bottom: 22px;
      padding: 14px;
      border-radius: 12px;
      background: #ecfdf5;
      color: #15803d;
      font-weight: 900;
    }

    .stock-row.out {
      background: #fee2e2;
      color: #b91c1c;
    }

    /* ================= QUANTITY ================= */

    .quantity-section {
      margin-bottom: 23px;
    }

    .quantity-section label {
      display: block;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .quantity-control {
      width: fit-content;
      display: flex;
      overflow: hidden;
      border: 1px solid #d1d5db;
      border-radius: 11px;
    }

    .quantity-control button {
      width: 44px;
      height: 42px;
      border: none;
      background: #f3f4f6;
      font-size: 21px;
      font-weight: 900;
      cursor: pointer;
    }

    .quantity-control button:hover {
      background: #fbbf24;
    }

    .quantity-control span {
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    /* ================= ACTION BUTTONS ================= */

    .product-action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .product-action-buttons button {
      min-height: 52px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .product-action-buttons button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .add-cart-detail-btn {
      background: #111827;
      color: #ffffff;
    }

    .buy-now-detail-btn {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #111827;
    }

    .wishlist-detail-btn {
      grid-column: 1 / -1;
      border: 1px solid #d1d5db !important;
      background: #ffffff;
      color: #ef4444;
    }

    .wishlist-detail-btn.saved {
      border-color: #ef4444 !important;
      background: #fff1f2;
    }

    /* ================= SPECIFICATIONS ================= */

    .product-extra-section,
    .reviews-section {
      margin-top: 30px;
      padding: 32px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 32px rgba(17, 24, 39, 0.07);
    }

    .specification-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      overflow: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
    }

    .specification-item {
      padding: 15px 18px;
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 15px;
      border-bottom: 1px solid #e5e7eb;
    }

    .specification-item:nth-child(odd) {
      border-right: 1px solid #e5e7eb;
    }

    .specification-item:nth-last-child(-n + 2) {
      border-bottom: none;
    }

    .specification-item span {
      color: #6b7280;
    }

    /* ================= REVIEWS ================= */

    .reviews-heading {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .reviews-heading p {
      color: #6b7280;
    }

    .reviews-summary {
      min-width: 160px;
      padding: 16px;
      border: 1px solid #fde68a;
      border-radius: 15px;
      background: #fffbeb;
      text-align: center;
    }

    .reviews-average {
      display: block;
      font-size: 32px;
      font-weight: 900;
    }

    .reviews-summary-stars,
    .review-card-stars {
      color: #f59e0b;
      letter-spacing: 2px;
    }

    .reviews-total {
      color: #6b7280;
      font-size: 12px;
    }

    .reviews-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 26px;
    }

    .review-form-box,
    .reviews-list-box {
      padding: 22px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #f8fafc;
    }

    .review-field {
      margin-bottom: 16px;
    }

    .review-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 900;
    }

    .review-field input,
    .review-field textarea {
      width: 100%;
      padding: 13px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .review-field textarea {
      min-height: 115px;
      resize: vertical;
    }

    .review-star-picker {
      display: flex;
      gap: 7px;
    }

    .review-star-button {
      padding: 0;
      border: none;
      background: transparent;
      color: #d1d5db;
      font-size: 31px;
      cursor: pointer;
    }

    .review-star-button.active,
    .review-star-button:hover {
      color: #f59e0b;
    }

    .review-rating-message {
      color: #6b7280;
      font-size: 12px;
      font-weight: 800;
    }

    .submit-review-button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 11px;
      background: #111827;
      color: #ffffff;
      font-weight: 900;
      cursor: pointer;
    }

    .reviews-list {
      display: grid;
      gap: 14px;
    }

    .review-card {
      padding: 17px;
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      background: #ffffff;
    }

    .review-card-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .review-user-name {
      font-weight: 900;
    }

    .review-date {
      color: #9ca3af;
      font-size: 11px;
    }

    .review-card-text {
      color: #4b5563;
      line-height: 1.6;
    }

    .empty-reviews {
      padding: 38px;
      border: 1px dashed #d1d5db;
      border-radius: 13px;
      background: #ffffff;
      text-align: center;
      color: #6b7280;
    }

    /* ================= RELATED PRODUCTS ================= */

    .related-section {
      margin-top: 35px;
    }

    .related-products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .related-card {
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #ffffff;
      text-align: left;
      box-shadow: 0 8px 26px rgba(17, 24, 39, 0.08);
      cursor: pointer;
      transition: 0.3s;
    }

    .related-card:hover {
      transform: translateY(-6px);
    }

    .related-card-image {
      height: 180px;
      margin-bottom: 13px;
      overflow: hidden;
      border-radius: 12px;
      background: #f8fafc;
    }

    .related-card-image img {
      width: 100%;
      height: 100%;
      padding: 10px;
      object-fit: contain;
    }

    .related-card h3 {
      margin: 0 0 9px;
    }

    .related-card-price {
      margin: 0;
      color: #16a34a;
      font-size: 18px;
      font-weight: 900;
    }

    /* ================= NOT FOUND ================= */

    .product-not-found {
      max-width: 700px;
      margin: 80px auto;
      padding: 60px 25px;
      border-radius: 20px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 10px 35px rgba(17, 24, 39, 0.08);
    }

    .product-not-found-icon {
      font-size: 70px;
    }

    .product-not-found p {
      color: #6b7280;
    }

    .product-not-found a {
      display: inline-block;
      padding: 13px 24px;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 900;
    }

    /* ================= TOAST ================= */

    .product-toast {
      position: fixed;
      right: 25px;
      bottom: 25px;
      z-index: 2000;
      max-width: 330px;
      padding: 14px 19px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      font-weight: 800;
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: 0.3s;
    }

    .product-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* ================= RESPONSIVE ================= */

    @media (max-width: 1000px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }

      .related-products {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .product-page-header {
        padding: 13px 4%;
      }

      .product-logo {
        font-size: 22px;
      }

      .product-nav {
        gap: 7px;
      }

      .product-nav a {
        padding: 9px;
        font-size: 12px;
      }

      .product-page {
        padding: 22px 13px 45px;
      }

      .product-detail-card {
        padding: 18px;
        gap: 25px;
      }

      .main-image-box {
        height: 320px;
      }

      .product-detail-info h1 {
        font-size: 28px;
      }

      .product-benefits,
      .product-action-buttons,
      .specification-grid,
      .reviews-layout,
      .related-products {
        grid-template-columns: 1fr;
      }

      .wishlist-detail-btn {
        grid-column: auto;
      }

      .product-extra-section,
      .reviews-section {
        padding: 20px;
      }

      .specification-item {
        grid-template-columns: 115px 1fr;
      }

      .specification-item,
      .specification-item:nth-child(odd) {
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }

      .specification-item:last-child {
        border-bottom: none;
      }

      .reviews-heading {
        flex-direction: column;
      }

      .reviews-summary {
        width: 100%;
      }
    }
  </style>
</head>

  <!-- ================= HEADER ================= -->

  <header class="product-page-header">

    <a href="index.html" class="product-logo">
      Elite<span>Store</span>
    </a>

    <nav class="product-nav">

      <a href="index.html">
        🏠 Home
      </a>

      <a href="wishlist.html">
        ❤️ Wishlist
      </a>

      <a href="cart.html">
        🛒 Cart

        <span
          class="cart-count-badge"
          id="cart-count"
        >
          0
        </span>
      </a>

    </nav>

  </header>

  <!-- ================= PRODUCT PAGE ================= -->

  <main class="product-page">

    <div class="breadcrumb">

      <a href="index.html">
        Home
      </a>

      /

      <span id="breadcrumbProduct">
        Product Details
      </span>

    </div>

    <div id="productPageContent"></div>

    <!-- Specifications -->

    <section
      class="product-extra-section"
      id="productExtraSection"
      hidden
    >

      <h2>Product Specifications</h2>

      <div
        class="specification-grid"
        id="productSpecifications"
      ></div>

    </section>

    <!-- Reviews -->

    <section
      class="reviews-section"
      id="reviewsSection"
      hidden
    >

      <div class="reviews-heading">

        <div>

          <h2>
            Customer Reviews & Ratings
          </h2>

          <p>
            Share your experience and read what other customers think.
          </p>

        </div>

        <div class="reviews-summary">

          <span
            class="reviews-average"
            id="reviewsAverage"
          >
            0.0
          </span>

          <div
            class="reviews-summary-stars"
            id="reviewsSummaryStars"
          >
            ☆☆☆☆☆
          </div>

          <span
            class="reviews-total"
            id="reviewsTotal"
          >
            0 reviews
          </span>

        </div>

      </div>

      <div class="reviews-layout">

        <form
          class="review-form-box"
          id="reviewForm"
          novalidate
        >

          <h3>Write a Review</h3>

          <div class="review-field">

            <label for="reviewerName">
              Your Name
            </label>

            <input
              type="text"
              id="reviewerName"
              placeholder="Enter your name"
              maxlength="50"
            >

          </div>

          <div class="review-field">

            <label>
              Your Rating
            </label>

            <div class="review-star-picker">

              <button
                type="button"
                class="review-star-button"
                data-rating="1"
              >
                ★
              </button>

              <button
                type="button"
                class="review-star-button"
                data-rating="2"
              >
                ★
              </button>

              <button
                type="button"
                class="review-star-button"
                data-rating="3"
              >
                ★
              </button>

              <button
                type="button"
                class="review-star-button"
                data-rating="4"
              >
                ★
              </button>

              <button
                type="button"
                class="review-star-button"
                data-rating="5"
              >
                ★
              </button>

            </div>

            <p
              class="review-rating-message"
              id="reviewRatingMessage"
            >
              Select 1 to 5 stars.
            </p>

          </div>

          <div class="review-field">

            <label for="reviewMessage">
              Your Review
            </label>

            <textarea
              id="reviewMessage"
              placeholder="Tell us about the product..."
              maxlength="500"
            ></textarea>

          </div>

          <button
            type="submit"
            class="submit-review-button"
          >
            Submit Review
          </button>

        </form>

        <div class="reviews-list-box">

          <h3>Latest Reviews</h3>

          <div
            class="reviews-list"
            id="reviewsList"
          ></div>

        </div>

      </div>

    </section>

    <!-- Related Products -->

    <section
      class="related-section"
      id="relatedSection"
      hidden
    >

      <h2>You May Also Like</h2>

      <div
        class="related-products"
        id="relatedProducts"
      ></div>

    </section>

  </main>

  <div
    class="product-toast"
    id="productToast"
  ></div>

          stock: 7,
          description:
            "Portable Bluetooth speaker with powerful audio and modern design.",
          image:
            "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=600&h=600&fit=crop"
        }
      ];


      /* ================= PAGE VARIABLES ================= */

      let catalog = [];
      let activeProduct = null;
      let quantity = 1;
      let selectedRating = 0;
      let toastTimer = null;


      /* ================= STORAGE HELPERS ================= */

      function readArray(key) {
        try {
          const value =
            JSON.parse(
              localStorage.getItem(key)
            );

          return Array.isArray(value)
            ? value
            : [];
        } catch (error) {
          return [];
        }
      }

      function readObject(key) {
        try {
          const value =
            JSON.parse(
              localStorage.getItem(key)
            );

          return (
            value &&
            typeof value === "object" &&
            !Array.isArray(value)
          )
            ? value
            : null;
        } catch (error) {
          return null;
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function money(value) {
        return Number(value || 0)
          .toLocaleString(
            "en-IN",
            {
              maximumFractionDigits: 2
            }
          );
      }


      /* ================= PRODUCT CATALOG ================= */

      function normalizeProducts(list) {
        const unique =
          new Map();

        if (!Array.isArray(list)) {
          return [];
        }

        list.forEach(product => {
          if (
            product &&
            product.id !== undefined &&
            product.id !== null
          ) {
            unique.set(
              String(product.id),
              product
            );
          }
        });

        return Array.from(
          unique.values()
        );
      }

      function loadCatalog() {
        const savedProducts =
          normalizeProducts(
            readArray(
              PAGE_PRODUCTS_KEY
            )
          );

        if (savedProducts.length) {
          return savedProducts;
        }

        try {
          if (
            typeof products !==
              "undefined" &&
            Array.isArray(products) &&
            products.length
          ) {
            return normalizeProducts(
              products
            );
          }
        } catch (error) {
          console.warn(
            "Global products unavailable."
          );
        }

        try {
          if (
            typeof DEFAULT_PRODUCTS !==
              "undefined" &&
            Array.isArray(
              DEFAULT_PRODUCTS
            ) &&
            DEFAULT_PRODUCTS.length
          ) {
            return normalizeProducts(
              DEFAULT_PRODUCTS
            );
          }
        } catch (error) {
          console.warn(
            "Default products unavailable."
          );
        }

        return normalizeProducts(
          PAGE_DEFAULT_PRODUCTS
        );
      }

      function findProduct(productId) {
        return (
          catalog.find(product => {
            return (
              String(product.id) ===
              String(productId)
            );
          }) || null
        );
      }

      function getProductToShow() {
        const queryId =
          new URLSearchParams(
            window.location.search
          ).get("id");

        const selectedData =
          readObject(
            PAGE_SELECTED_DATA_KEY
          );

        const selectedId =
          localStorage.getItem(
            PAGE_SELECTED_ID_KEY
          );

        if (queryId) {
          const queryProduct =
            findProduct(queryId);

          if (queryProduct) {
            return queryProduct;
          }
        }

        if (
          selectedData?.id !==
          undefined
        ) {
          return (
            findProduct(
              selectedData.id
            ) ||
            selectedData
          );
        }

        if (selectedId) {
          const savedProduct =
            findProduct(selectedId);

          if (savedProduct) {
            return savedProduct;
          }
        }

        return catalog[0] || null;
      }

      function getStock(product) {
        const value =
          Number(product?.stock);

        return Number.isFinite(value)
          ? Math.max(0, value)
          : 10;
      }

      function getImages(product) {
        return (
          Array.isArray(
            product?.images
          ) &&
          product.images.length
        )
          ? product.images.filter(
              Boolean
            )
          : [
              product?.image ||
              NO_IMAGE
            ];
      }


      /* ================= CART AND WISHLIST ================= */

      function getCart() {
        return readArray("cart");
      }

      function getWishlist() {
        return readArray(
          "wishlist"
        );
      }

      function saveCart(data) {
        if (
          typeof saveStorageArray ===
          "function"
        ) {
          return saveStorageArray(
            "cart",
            data
          );
        }

        localStorage.setItem(
          "cart",
          JSON.stringify(data)
        );

        return true;
      }

      function saveWishlist(data) {
        if (
          typeof saveStorageArray ===
          "function"
        ) {
          return saveStorageArray(
            "wishlist",
            data
          );
        }

        localStorage.setItem(
          "wishlist",
          JSON.stringify(data)
        );

        return true;
      }

      function updateCartCount() {
        const total =
          getCart().reduce(
            (sum, item) => {
              return (
                sum +
                Math.max(
                  1,
                  Number(
                    item?.qty ??
                    item?.quantity
                  ) || 1
                )
              );
            },
            0
          );

        const count =
          document.getElementById(
            "cart-count"
          );

        if (count) {
          count.textContent = total;
        }
      }

      function isWishlisted(
        productId
      ) {
        return getWishlist()
          .some(item => {
            return (
              String(item.id) ===
              String(productId)
            );
          });
      }

        const stock =

        const saved =

        document.getElementById(

        ).innerHTML = `
          <section class="product-detail-card">

                <img

              </div>

              ${

                            <img

                    </div>
                  `

              }

            </div>

            <div class="product-detail-info">

              <span class="product-category">
                ${escapeHtml(
                  activeProduct.category ||
                  "Product"
                )}
              </span>

              <h1>
                ${escapeHtml(
                  activeProduct.name ||
                  "Product"
                )}
              </h1>

              <div class="rating-row">

                <span
                  class="rating-stars"
                  id="productRatingStars"
                >
                  ★★★★★
                </span>

                <span
                  class="rating-count"
                  id="productRatingCount"
                >
                  4.8 (${Number(activeProduct.reviews) || 0} Reviews)
                </span>

              </div>

              <div class="price-section">

                <span class="current-price">

                </span>

                ${

                    ? `
                      <span class="old-price-detail">

                      <span class="saving-text">
                        Save ₹${money(oldPrice - price)}
                      </span>
                    `
                    : ""
                }

              </div>

              <p class="tax-text">

              </p>

              </p>

              <div class="product-benefits">

                <div class="benefit-box">

                </div>

                <div class="benefit-box">

              <div
                class="stock-row ${
                  stock <= 0
                    ? "out"
                    : ""

              >

                  Select Quantity

                  </span>

                    type="button"
                    id="plusQuantity"

                    +
                  </button>

              <div class="product-action-buttons">

                <button
                  type="button"

                  ${
                    stock <= 0
                      ? "disabled"

                  🛒 Add to Cart
                </button>

                <button
                  type="button"
                  class="buy-now-detail-btn"

                  ${
                    stock <= 0
                      ? "disabled"

                  ⚡ Buy Now

                    saved

        bindProductButtons();

      /* ================= PRODUCT BUTTONS ================= */

      function bindProductButtons() {
        document
          .querySelectorAll(
            ".thumbnail-button"
          )
          .forEach(button => {
            button.addEventListener(
              "click",
              () => {
                document.getElementById(
                  "mainProductImage"
                ).src =
                  button.dataset.image;

                document
                  .querySelectorAll(
                    ".thumbnail-button"
                  )
                  .forEach(item => {
                    item.classList.remove(
                      "active"
                    );
                  });

                button.classList.add(
                  "active"
                );
              }
            );
          });

        document
          .getElementById(
            "minusQuantity"
          )
          ?.addEventListener(
            "click",
            () => {
              changeQuantity(-1);
            }
          );

        document
          .getElementById(
            "plusQuantity"
          )
          ?.addEventListener(
            "click",
            () => {
              changeQuantity(1);
            }
          );

        document
          .getElementById(
            "addCartButton"
          )
          ?.addEventListener(
            "click",
            () => {
              addProduct(false);
            }
          );

        document
          .getElementById(
            "buyNowButton"
          )
          ?.addEventListener(
            "click",
            () => {
              addProduct(true);
            }
          );

        document
          .getElementById(
            "wishlistButton"
          )
          ?.addEventListener(
            "click",
            toggleWishlist
          );
      }

      function changeQuantity(change) {
        const maximum =
          Math.max(
            1,
            Math.min(
              10,
              getStock(
                activeProduct
              ) || 1
            )
          );

        quantity =
          Math.max(
            1,
            Math.min(
              maximum,
              quantity + change
            )
          );

        document.getElementById(
          "productQuantity"
        ).textContent =
          quantity;
      }


      /* ================= ADD TO CART / BUY NOW ================= */

      function addProduct(buyNow) {
        const stock =
          getStock(activeProduct);

        if (stock <= 0) {
          showToast(
            "This product is out of stock."
          );

          return;
        }

        const cartData =
          getCart();

        const item =
          cartData.find(product => {
            return (
              String(product.id) ===
              String(
                activeProduct.id
              )
            );
          });

        const currentQuantity =
          item
            ? Math.max(
                1,
                Number(
                  item.qty ??
                  item.quantity
                ) || 1
              )
            : 0;

        const finalQuantity =
          Math.min(
            stock,
            currentQuantity +
            quantity
          );

        if (item) {
          item.qty =
            finalQuantity;

          item.quantity =
            finalQuantity;
        } else {
          cartData.push({
            ...activeProduct,
            qty:
              finalQuantity,
            quantity:
              finalQuantity
          });
        }

        if (!saveCart(cartData)) {
          return;
        }

        updateCartCount();

        if (buyNow) {
          if (
            typeof openCheckout ===
            "function"
          ) {
            openCheckout();
          } else {
            const user =
              readObject("user") ||
              readObject("eliteUser") ||
              readObject(
                "eliteUserAccount"
              );

            if (!user) {
              localStorage.setItem(
                "eliteLoginRedirect",
                "checkout.html"
              );

              window.location.href =
                "login.html";
            } else {
              window.location.href =
                "checkout.html";
            }
          }

          return;
        }

        showToast(
          `${quantity} × ${activeProduct.name} added to cart.`
        );
      }


      /* ================= WISHLIST ================= */

      function toggleWishlist() {
        const wishlistData =
          getWishlist();

        const index =
          wishlistData.findIndex(
            product => {
              return (
                String(product.id) ===
                String(
                  activeProduct.id
                )
              );
            }
          );

        const button =
          document.getElementById(
            "wishlistButton"
          );

        if (index === -1) {
          wishlistData.push({
            ...activeProduct
          });

          button.classList.add(
            "saved"
          );

          button.textContent =
            "♥ Saved in Wishlist";

          showToast(
            "Product added to wishlist."
          );
        } else {
          wishlistData.splice(
            index,
            1
          );

          button.classList.remove(
            "saved"
          );

          button.textContent =
            "♡ Add to Wishlist";

          showToast(
            "Product removed from wishlist."
          );
        }

        saveWishlist(
          wishlistData
        );
      }


      /* ================= SPECIFICATIONS ================= */

      function renderSpecifications() {
        const specifications = [
          [
            "Product Name",
            activeProduct.name
          ],

          [

            activeProduct.category ||
            "General"
          ],

          [

            activeProduct.brand ||
            "Elite"
          ],

          [
            "Availability",
            getStock(
              activeProduct
            ) > 0
              ? "In Stock"
              : "Out of Stock"
          ],

          [
            "Delivery",
            "Free Delivery"
          ],

          [
            "Return Policy",
            "7-Day Replacement"
          ],

            "Warranty",

          ],

          [

          ]
        ];

        document.getElementById(

        ).innerHTML =

      /* ================= REVIEWS ================= */

      function allReviews() {
        return (
          readObject(
            PAGE_REVIEWS_KEY
          ) || {}
        );
      }

      function productReviews() {
        const reviews =
          allReviews()[
            String(
              activeProduct.id
            )
          ];

        return Array.isArray(
          reviews
        )
          ? reviews
          : [];
      }

      function stars(value) {
        const rounded =
          Math.round(
            Number(value) || 0
          );

        return Array.from(
          {
            length: 5
          },
          (
            _,
            index
          ) => {
            return index < rounded
              ? "★"
              : "☆";
          }
        ).join("");
      }

      function renderReviews() {
        const reviews =
          productReviews();

        const baseCount =
          Math.max(
            0,
            Number(
              activeProduct.reviews
            ) || 0
          );

        const baseRating =
          Number(
            activeProduct.rating
          ) || 4.8;

        const ratingTotal =
          reviews.reduce(
            (
              total,
              review
            ) => {
              return (
                total +
                (
                  Number(
                    review.rating
                  ) || 0
                )
              );
            },
            0
          );

        const totalCount =
          baseCount +
          reviews.length;

        const average =
          totalCount
            ? (
                (
                  baseRating *
                  baseCount
                ) +
                ratingTotal
              ) /
              totalCount
            : 0;

        document.getElementById(
          "reviewsAverage"
        ).textContent =
          average.toFixed(1);

        document.getElementById(
          "reviewsSummaryStars"
        ).textContent =
          stars(average);

        document.getElementById(
          "reviewsTotal"
        ).textContent =
          `${totalCount} reviews`;

        document.getElementById(
          "productRatingStars"
        ).textContent =
          stars(average);

        document.getElementById(
          "productRatingCount"
        ).textContent =
          `${average.toFixed(1)} (${totalCount} Reviews)`;

        document.getElementById(
          "reviewsList"
        ).innerHTML =
          reviews.length
            ? reviews.map(
                review => `
                  <article class="review-card">

                    <div class="review-card-top">

                      <div>

                        <div class="review-user-name">
                          ${escapeHtml(
                            review.name ||
                            "Customer"
                          )}
                        </div>

                        <div class="review-date">
                          ${new Date(
                            review.date
                          ).toLocaleDateString(
                            "en-IN"
                          )}
                        </div>

                      </div>

                      <div class="review-card-stars">
                        ${stars(
                          review.rating
                        )}
                      </div>

                    </div>

                    <p class="review-card-text">
                      ${escapeHtml(
                        review.message ||
                        ""
                      )}
                    </p>

                  </article>
                `
              ).join("")
            : `
                <div class="empty-reviews">

                  <div style="font-size: 42px;">
                    ⭐
                  </div>

                  <strong>
                    No customer reviews yet
                  </strong>

                  <p>
                    Be the first person to review this product.
                  </p>

                </div>
              `;

        const user =
          readObject("user") ||
          readObject("eliteUser") ||
          readObject(
            "eliteUserAccount"
          );

        const reviewerName =
          document.getElementById(
            "reviewerName"
          );

        if (
          user &&
          reviewerName &&
          !reviewerName.value.trim()
        ) {
          reviewerName.value =
            user.name ||
            user.fullName ||
            "";
        }

        document.getElementById(
          "reviewsSection"
        ).hidden = false;
      }

      function submitReview(event) {
        event.preventDefault();

        const name =
          document.getElementById(
            "reviewerName"
          ).value.trim();

        const message =
          document.getElementById(
            "reviewMessage"
          ).value.trim();

        if (name.length < 2) {
          showToast(
            "Please enter your name."
          );

          return;
        }

        if (!selectedRating) {
          showToast(
            "Please select a star rating."
          );

          return;
        }

        if (message.length < 5) {
          showToast(
            "Please write at least 5 characters."
          );

          return;
        }

        const all =
          allReviews();

        const reviews =
          productReviews();

        reviews.unshift({
          id:
            Date.now(),

          name:
            name,

          rating:
            selectedRating,

          message:
            message,

          date:
            new Date()
              .toISOString()
        });

        all[
          String(
            activeProduct.id
          )
        ] =
          reviews;

        localStorage.setItem(
          PAGE_REVIEWS_KEY,
          JSON.stringify(all)
        );

        document.getElementById(
          "reviewMessage"
        ).value = "";

        selectedRating = 0;

        document
          .querySelectorAll(
            ".review-star-button"
          )
          .forEach(button => {
            button.classList.remove(
              "active"
            );
          });

        document.getElementById(
          "reviewRatingMessage"
        ).textContent =
          "Select 1 to 5 stars.";

        renderReviews();

        showToast(
          "Your review has been submitted."
        );
      }


      /* ================= RELATED PRODUCTS ================= */

      function renderRelatedProducts() {
        const related =
          catalog
            .filter(product => {
              return (
                String(product.id) !==
                String(
                  activeProduct.id
                )
              );
            })
            .sort(
              (
                first,
                second
              ) => {
                return (
                  (
                    second.category ===
                    activeProduct.category
                  ) -
                  (
                    first.category ===
                    activeProduct.category
                  )
                );
              }
            )
            .slice(0, 4);

        if (!related.length) {
          return;
        }

        const box =
          document.getElementById(
            "relatedProducts"
          );

        box.innerHTML =
          related.map(
            product => `
              <button
                type="button"
                class="related-card"
                data-product-id="${escapeHtml(product.id)}"
              >

                <div class="related-card-image">

                  <img
                    src="${escapeHtml(product.image || NO_IMAGE)}"
                    alt="${escapeHtml(product.name)}"
                    onerror="this.onerror=null; this.src='${NO_IMAGE}';"
                  >

                </div>

                <h3>
                  ${escapeHtml(product.name)}
                </h3>

                <p class="related-card-price">
                  ₹${money(product.price)}
                </p>

              </button>
            `
          ).join("");

        box.querySelectorAll(
          ".related-card"
        ).forEach(card => {
          card.addEventListener(
            "click",
            () => {
              const product =
                findProduct(
                  card.dataset.productId
                );

              if (product) {
                localStorage.setItem(
                  PAGE_SELECTED_DATA_KEY,
                  JSON.stringify(product)
                );
              }

              localStorage.setItem(
                PAGE_SELECTED_ID_KEY,
                card.dataset.productId
              );

              window.location.href =
                `product.html?id=${encodeURIComponent(
                  card.dataset.productId
                )}`;
            }
          );
        });

        document.getElementById(
          "relatedSection"
        ).hidden = false;
      }


      /* ================= TOAST ================= */

      function showToast(message) {
        const toast =
          document.getElementById(
            "productToast"
          );

        toast.textContent =
          message;

        toast.classList.add(
          "show"
        );

        clearTimeout(
          toastTimer
        );

        toastTimer =
          setTimeout(
            () => {
              toast.classList.remove(
                "show"
              );
            },
            2500
          );
      }


      /* ================= REVIEW EVENTS ================= */

      function bindReviewEvents() {
        document
          .querySelectorAll(
            ".review-star-button"
          )
          .forEach(button => {
            button.addEventListener(
              "click",
              () => {
                selectedRating =
                  Number(
                    button.dataset.rating
                  );

                document
                  .querySelectorAll(
                    ".review-star-button"
                  )
                  .forEach(
                    starButton => {
                      starButton.classList.toggle(
                        "active",
                        Number(
                          starButton.dataset.rating
                        ) <=
                        selectedRating
                      );
                    }
                  );

                document.getElementById(
                  "reviewRatingMessage"
                ).textContent =
                  `${selectedRating} out of 5 stars selected.`;
              }
            );
          });

        document
          .getElementById(
            "reviewForm"
          )
          .addEventListener(
            "submit",
            submitReview
          );
      }


      /* ================= INITIALIZATION ================= */

      function initializeProductPage() {
        catalog =
          loadCatalog();

        const selectedData =
          readObject(
            PAGE_SELECTED_DATA_KEY
          );

        if (
          selectedData?.id !==
            undefined &&
          !findProduct(
            selectedData.id
          )
        ) {
          catalog.unshift(
            selectedData
          );
        }

        renderProduct();
        updateCartCount();
        bindReviewEvents();
      }

      if (
        document.readyState ===
        "loading"
      ) {
        document.addEventListener(
          "DOMContentLoaded",
          initializeProductPage
        );
      } else {
        initializeProductPage();
      }

    })();
  </script>

</body>
</html>
