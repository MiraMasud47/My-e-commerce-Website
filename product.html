<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Product Details - EliteStore</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* ================= PRODUCT PAGE ================= */

    body {
      background: #f4f6f8;
      color: #111827;
    }

    .product-page-header {
      background: #111827;
      color: white;
      padding: 15px 7%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.14);
    }

    .product-page-header .logo {
      font-size: 27px;
      font-weight: 800;
    }

    .product-page-header .logo span {
      color: #fbbf24;
    }

    .product-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .product-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      background: #fbbf24;
      color: #111827;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      transition: 0.25s;
    }

    .product-nav a:hover {
      background: white;
      transform: translateY(-2px);
    }

    .cart-link {
      position: relative;
    }

    .cart-count-badge {
      min-width: 21px;
      height: 21px;
      padding: 0 6px;
      position: absolute;
      top: -9px;
      right: -9px;
      border-radius: 20px;
      background: #ef4444;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    /* ================= MAIN PAGE ================= */

    .product-page {
      max-width: 1250px;
      min-height: calc(100vh - 80px);
      margin: auto;
      padding: 30px 25px 60px;
    }

    .breadcrumb {
      margin-bottom: 22px;
      color: #6b7280;
      font-size: 14px;
    }

    .breadcrumb a {
      color: #d97706;
      text-decoration: none;
      font-weight: 700;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .product-detail-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(380px, 1fr);
      gap: 45px;
      padding: 35px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 12px 38px rgba(17, 24, 39, 0.09);
    }

    /* ================= PRODUCT IMAGES ================= */

    .product-gallery {
      min-width: 0;
    }

    .main-image-box {
      width: 100%;
      height: 480px;
      position: relative;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
    }

    .main-image-box img {
      width: 100%;
      height: 100%;
      padding: 22px;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: transform 0.4s ease;
    }

    .main-image-box:hover img {
      transform: scale(1.1);
    }

    .discount-badge-detail {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 5;
      padding: 7px 13px;
      border-radius: 30px;
      background: #ef4444;
      color: white;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(239, 68, 68, 0.28);
    }

    .thumbnail-list {
      margin-top: 15px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .thumbnail-button {
      width: 78px;
      height: 78px;
      padding: 5px;
      flex: 0 0 78px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: 0.25s;
    }

    .thumbnail-button:hover,
    .thumbnail-button.active {
      border-color: #f59e0b;
    }

    .thumbnail-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ================= PRODUCT INFORMATION ================= */

    .product-detail-info {
      min-width: 0;
    }

    .product-category {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-radius: 30px;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .product-detail-info h1 {
      margin-bottom: 14px;
      color: #111827;
      font-size: 37px;
      line-height: 1.2;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .rating-stars {
      color: #f59e0b;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .rating-count {
      color: #6b7280;
      font-size: 14px;
    }

    .price-section {
      display: flex;
      align-items: center;
      gap: 13px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .current-price {
      color: #16a34a;
      font-size: 32px;
      font-weight: 900;
    }

    .old-price-detail {
      color: #9ca3af;
      font-size: 19px;
      text-decoration: line-through;
    }

    .saving-text {
      color: #dc2626;
      font-size: 14px;
      font-weight: 800;
    }

    .tax-text {
      margin-top: -7px;
      margin-bottom: 22px;
      color: #6b7280;
      font-size: 13px;
    }

    .product-description {
      margin-bottom: 22px;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.75;
    }

    .product-benefits {
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .benefit-box {
      padding: 13px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    .stock-row {
      margin-bottom: 22px;
      padding: 14px;
      border-radius: 12px;
      background: #ecfdf5;
      color: #15803d;
      font-size: 14px;
      font-weight: 800;
    }

    /* ================= QUANTITY ================= */

    .quantity-section {
      margin-bottom: 23px;
    }

    .quantity-section > label {
      display: block;
      margin-bottom: 10px;
      color: #374151;
      font-size: 14px;
      font-weight: 800;
    }

    .quantity-control {
      width: fit-content;
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 1px solid #d1d5db;
      border-radius: 11px;
      background: white;
    }

    .quantity-control button {
      width: 44px;
      height: 42px;
      border: none;
      background: #f3f4f6;
      color: #111827;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .quantity-control button:hover {
      background: #fbbf24;
    }

    .quantity-control span {
      width: 52px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    /* ================= ACTION BUTTONS ================= */

    .product-action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .product-action-buttons button {
      min-height: 52px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.3s;
    }

    .add-cart-detail-btn {
      background: #111827;
      color: white;
    }

    .add-cart-detail-btn:hover {
      background: #374151;
      transform: translateY(-2px);
    }

    .buy-now-detail-btn {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #111827;
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.25);
    }

    .buy-now-detail-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 11px 26px rgba(245, 158, 11, 0.35);
    }

    .wishlist-detail-btn {
      grid-column: 1 / -1;
      border: 1px solid #d1d5db !important;
      background: white;
      color: #ef4444;
    }

    .wishlist-detail-btn:hover,
    .wishlist-detail-btn.saved {
      border-color: #ef4444 !important;
      background: #fff1f2;
    }

    /* ================= PRODUCT INFORMATION SECTION ================= */

    .product-extra-section {
      margin-top: 30px;
      padding: 32px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 32px rgba(17, 24, 39, 0.07);
    }

    .product-extra-section h2 {
      margin-bottom: 22px;
      font-size: 25px;
      color: #111827;
    }

    .specification-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
    }

    .specification-item {
      min-height: 55px;
      padding: 15px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 15px;
    }

    .specification-item:nth-last-child(-n+2) {
      border-bottom: none;
    }

    .specification-item:nth-child(odd) {
      border-right: 1px solid #e5e7eb;
    }

    .specification-item strong {
      color: #374151;
    }

    .specification-item span {
      color: #6b7280;
    }


    /* ================= REVIEWS & RATINGS ================= */

    .reviews-section {
      margin-top: 30px;
      padding: 32px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 32px rgba(17, 24, 39, 0.07);
    }

    .reviews-heading {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .reviews-heading h2 {
      margin-bottom: 7px;
      color: #111827;
      font-size: 27px;
    }

    .reviews-heading p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .reviews-summary {
      min-width: 160px;
      padding: 16px 20px;
      border: 1px solid #fde68a;
      border-radius: 15px;
      background: #fffbeb;
      text-align: center;
    }

    .reviews-average {
      display: block;
      margin-bottom: 4px;
      color: #111827;
      font-size: 32px;
      font-weight: 900;
    }

    .reviews-summary-stars {
      margin-bottom: 5px;
      color: #f59e0b;
      font-size: 18px;
      letter-spacing: 2px;
    }

    .reviews-total {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .reviews-layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 26px;
      align-items: start;
    }

    .review-form-box,
    .reviews-list-box {
      padding: 22px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #f8fafc;
    }

    .review-form-box h3,
    .reviews-list-box h3 {
      margin-bottom: 17px;
      color: #111827;
      font-size: 20px;
    }

    .review-field {
      margin-bottom: 16px;
    }

    .review-field label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-size: 13px;
      font-weight: 800;
    }

    .review-field input,
    .review-field textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      outline: none;
      transition: 0.25s;
    }

    .review-field textarea {
      min-height: 115px;
      resize: vertical;
    }

    .review-field input:focus,
    .review-field textarea:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
    }

    .review-star-picker {
      display: flex;
      gap: 7px;
    }

    .review-star-button {
      padding: 0;
      border: none;
      background: transparent;
      color: #d1d5db;
      font-size: 31px;
      line-height: 1;
      cursor: pointer;
      transition: 0.2s;
    }

    .review-star-button:hover,
    .review-star-button.active {
      color: #f59e0b;
      transform: scale(1.08);
    }

    .review-rating-message {
      margin-top: 7px;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .submit-review-button {
      width: 100%;
      min-height: 47px;
      padding: 12px 18px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg, #111827, #374151);
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.25s;
    }

    .submit-review-button:hover {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #111827;
      transform: translateY(-2px);
    }

    .reviews-list {
      display: grid;
      gap: 14px;
    }

    .review-card {
      padding: 17px;
      border: 1px solid #e5e7eb;
      border-radius: 13px;
      background: #ffffff;
    }

    .review-card-top {
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 15px;
    }

    .review-user-name {
      margin-bottom: 4px;
      color: #111827;
      font-size: 15px;
      font-weight: 900;
    }

    .review-date {
      color: #9ca3af;
      font-size: 11px;
    }

    .review-card-stars {
      color: #f59e0b;
      font-size: 15px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .review-card-text {
      color: #4b5563;
      font-size: 14px;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .empty-reviews {
      padding: 42px 18px;
      border: 1px dashed #d1d5db;
      border-radius: 13px;
      background: #ffffff;
      color: #6b7280;
      text-align: center;
    }

    .empty-reviews div {
      margin-bottom: 10px;
      font-size: 42px;
    }

    .empty-reviews strong {
      display: block;
      margin-bottom: 6px;
      color: #111827;
      font-size: 17px;
    }

    /* ================= RELATED PRODUCTS ================= */

    .related-section {
      margin-top: 35px;
    }

    .related-section h2 {
      margin-bottom: 22px;
      color: #111827;
      font-size: 28px;
    }

    .related-products {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    .related-card {
      position: relative;
      padding: 16px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 26px rgba(17, 24, 39, 0.08);
      cursor: pointer;
      transition: 0.3s;
    }

    .related-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 13px 32px rgba(17, 24, 39, 0.13);
    }

    .related-card-image {
      width: 100%;
      height: 180px;
      margin-bottom: 13px;
      overflow: hidden;
      border-radius: 12px;
      background: #f8fafc;
    }

    .related-card-image img {
      width: 100%;
      height: 100%;
      padding: 10px;
      object-fit: contain;
      display: block;
      transition: 0.3s;
    }

    .related-card:hover img {
      transform: scale(1.06);
    }

    .related-card h3 {
      margin-bottom: 9px;
      color: #111827;
      font-size: 16px;
    }

    .related-card-price {
      color: #16a34a;
      font-size: 18px;
      font-weight: 900;
    }

    /* ================= NOT FOUND ================= */

    .product-not-found {
      max-width: 700px;
      margin: 80px auto;
      padding: 60px 25px;
      border-radius: 20px;
      background: white;
      text-align: center;
      box-shadow: 0 10px 35px rgba(17, 24, 39, 0.08);
    }

    .product-not-found div {
      margin-bottom: 18px;
      font-size: 70px;
    }

    .product-not-found h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .product-not-found p {
      margin-bottom: 24px;
      color: #6b7280;
    }

    .product-not-found a {
      display: inline-block;
      padding: 13px 24px;
      border-radius: 10px;
      background: #111827;
      color: white;
      text-decoration: none;
      font-weight: 800;
    }

    /* ================= TOAST ================= */

    .product-toast {
      position: fixed;
      right: 25px;
      bottom: 25px;
      z-index: 2000;
      max-width: 330px;
      padding: 14px 19px;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: 0.3s;
    }

    .product-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    @media (max-width: 1000px) {
      .product-detail-card {
        grid-template-columns: 1fr;
      }

      .main-image-box {
        height: 430px;
      }

      .related-products {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 650px) {
      .product-page-header {
        padding: 13px 4%;
      }

      .product-page-header .logo {
        font-size: 22px;
      }

      .product-nav {
        gap: 7px;
      }

      .product-nav a {
        padding: 9px 11px;
        font-size: 12px;
      }

      .product-page {
        padding: 22px 13px 45px;
      }

      .product-detail-card {
        padding: 18px;
        gap: 25px;
      }

      .main-image-box {
        height: 320px;
      }

      .product-detail-info h1 {
        font-size: 28px;
      }

      .current-price {
        font-size: 27px;
      }

      .product-benefits {
        grid-template-columns: 1fr;
      }

      .product-action-buttons {
        grid-template-columns: 1fr;
      }

      .wishlist-detail-btn {
        grid-column: auto;
      }

      .product-extra-section {
        padding: 20px;
      }

      .specification-grid {
        grid-template-columns: 1fr;
      }

      .specification-item {
        grid-template-columns: 115px 1fr;
      }

      .specification-item,
      .specification-item:nth-child(odd) {
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }

      .specification-item:last-child {
        border-bottom: none;
      }


      .reviews-section {
        padding: 20px;
      }

      .reviews-heading {
        flex-direction: column;
      }

      .reviews-summary {
        width: 100%;
      }

      .reviews-layout {
        grid-template-columns: 1fr;
      }

      .related-products {
        grid-template-columns: 1fr;
      }

      .related-card-image {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <!-- ================= HEADER ================= -->

  <header class="product-page-header">

    <div class="logo">
      Elite<span>Store</span>
    </div>

    <nav class="product-nav">

      <a href="index.html">
        🏠 Home
      </a>

      <a href="wishlist.html">
        ❤️ Wishlist
      </a>

      <a href="cart.html" class="cart-link">
        🛒 Cart

        <span
          class="cart-count-badge"
          id="cart-count"
        >
          0
        </span>
      </a>

    </nav>

  </header>

  <!-- ================= PRODUCT PAGE ================= -->

  <main class="product-page">

    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span> / </span>
      <span id="breadcrumbProduct">Product Details</span>
    </div>

    <div id="productPageContent"></div>

    <section
      class="product-extra-section"
      id="productExtraSection"
      style="display: none;"
    >
      <h2>Product Specifications</h2>

      <div
        class="specification-grid"
        id="productSpecifications"
      ></div>
    </section>


    <section
      class="reviews-section"
      id="reviewsSection"
      style="display: none;"
    >
      <div class="reviews-heading">
        <div>
          <h2>Customer Reviews & Ratings</h2>
          <p>Share your experience and read what other customers think.</p>
        </div>

        <div class="reviews-summary">
          <span class="reviews-average" id="reviewsAverage">0.0</span>
          <div class="reviews-summary-stars" id="reviewsSummaryStars">☆☆☆☆☆</div>
          <span class="reviews-total" id="reviewsTotal">0 reviews</span>
        </div>
      </div>

      <div class="reviews-layout">

        <form class="review-form-box" id="reviewForm">
          <h3>Write a Review</h3>

          <div class="review-field">
            <label for="reviewerName">Your Name</label>
            <input
              type="text"
              id="reviewerName"
              placeholder="Enter your name"
              maxlength="50"
              autocomplete="name"
              required
            >
          </div>

          <div class="review-field">
            <label>Your Rating</label>

            <div class="review-star-picker" id="reviewStarPicker">
              <button type="button" class="review-star-button" data-rating="1" onclick="setReviewRating(1)">★</button>
              <button type="button" class="review-star-button" data-rating="2" onclick="setReviewRating(2)">★</button>
              <button type="button" class="review-star-button" data-rating="3" onclick="setReviewRating(3)">★</button>
              <button type="button" class="review-star-button" data-rating="4" onclick="setReviewRating(4)">★</button>
              <button type="button" class="review-star-button" data-rating="5" onclick="setReviewRating(5)">★</button>
            </div>

            <p class="review-rating-message" id="reviewRatingMessage">
              Select 1 to 5 stars.
            </p>
          </div>

          <div class="review-field">
            <label for="reviewMessage">Your Review</label>
            <textarea
              id="reviewMessage"
              placeholder="Tell us about the product..."
              maxlength="500"
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-review-button">
            Submit Review
          </button>
        </form>

        <div class="reviews-list-box">
          <h3>Latest Reviews</h3>
          <div class="reviews-list" id="reviewsList"></div>
        </div>

      </div>
    </section>


    <section
      class="related-section"
      id="relatedSection"
      style="display: none;"
    >
      <h2>You May Also Like</h2>

      <div
        class="related-products"
        id="relatedProducts"
      ></div>
    </section>

  </main>

  <div class="product-toast" id="productToast"></div>

  <!-- Product data and common functions -->
  <script src="script.js"></script>

  <script>
    const productCatalog =
      typeof products !== "undefined" ? products : [];

    const PRODUCT_REVIEWS_STORAGE_KEY = "productReviews";

    let activeProduct = null;
    let selectedQuantity = 1;
    let selectedReviewRating = 0;
    let toastTimer = null;

    function formatProductPrice(value) {
      return Number(value || 0).toLocaleString("en-IN");
    }

    function getSelectedProductId() {
      const parameters = new URLSearchParams(
        window.location.search
      );

      const queryId = Number(parameters.get("id"));
      const savedId = Number(
        localStorage.getItem("selectedProduct")
      );

      return queryId || savedId;
    }

    function getProductImages(product) {
      if (
        Array.isArray(product.images) &&
        product.images.length > 0
      ) {
        return product.images;
      }

      return [
        product.image || "./Website-images/no-image.png"
      ];
    }

    function getSavedCart() {
      try {
        const savedCart = JSON.parse(
          localStorage.getItem("cart")
        );

        return Array.isArray(savedCart) ? savedCart : [];

      } catch (error) {
        console.error("Unable to read cart:", error);
        return [];
      }
    }

    function getSavedWishlist() {
      try {
        const savedWishlist = JSON.parse(
          localStorage.getItem("wishlist")
        );

        return Array.isArray(savedWishlist)
          ? savedWishlist
          : [];

      } catch (error) {
        console.error("Unable to read wishlist:", error);
        return [];
      }
    }

    function updateProductCartCount() {
      const savedCart = getSavedCart();

      const totalQuantity = savedCart.reduce(
        (total, item) =>
          total + Math.max(1, Number(item.qty) || 1),
        0
      );

      const cartCount =
        document.getElementById("cart-count");

      if (cartCount) {
        cartCount.textContent = totalQuantity;
      }
    }

    function isProductWishlisted(productId) {
      return getSavedWishlist().some(
        item => Number(item.id) === Number(productId)
      );
    }

    function renderProductPage() {
      const selectedId = getSelectedProductId();

      activeProduct = productCatalog.find(
        product => Number(product.id) === selectedId
      );

      if (!activeProduct) {
        showProductNotFound();
        return;
      }

      localStorage.setItem(
        "selectedProduct",
        String(activeProduct.id)
      );

      document.title =
        `${activeProduct.name} - EliteStore`;

      document.getElementById(
        "breadcrumbProduct"
      ).textContent = activeProduct.name;

      const images = getProductImages(activeProduct);

      const oldPrice = Number(
        activeProduct.oldPrice ||
        activeProduct.price + 500
      );

      const discount = Number(
        activeProduct.discount ||
        Math.round(
          ((oldPrice - activeProduct.price) / oldPrice) * 100
        )
      );

      const reviews = Number(
        activeProduct.reviews || 100
      );

      const stock = Number(
        activeProduct.stock || 10
      );

      const savingAmount =
        oldPrice - Number(activeProduct.price);

      const wishlisted = isProductWishlisted(
        activeProduct.id
      );

      const content =
        document.getElementById("productPageContent");

      content.innerHTML = `
        <section class="product-detail-card">

          <div class="product-gallery">

            <div class="main-image-box">

              <span class="discount-badge-detail">
                -${discount}%
              </span>

              <img
                id="mainProductImage"
                src="${images[0]}"
                alt="${activeProduct.name}"
                onerror="this.onerror=null; this.src='./Website-images/no-image.png';"
              >

            </div>

            ${
              images.length > 1
                ? `
                  <div class="thumbnail-list">

                    ${images.map((image, index) => `
                      <button
                        type="button"
                        class="thumbnail-button ${index === 0 ? "active" : ""}"
                        onclick="changeProductImage('${image}', this)"
                      >
                        <img
                          src="${image}"
                          alt="${activeProduct.name} image ${index + 1}"
                          onerror="this.onerror=null; this.src='./Website-images/no-image.png';"
                        >
                      </button>
                    `).join("")}

                  </div>
                `
                : ""
            }

          </div>

          <div class="product-detail-info">

            <span class="product-category">
              ${activeProduct.category || "Product"}
            </span>

            <h1>${activeProduct.name}</h1>

            <div class="rating-row">

              <span class="rating-stars" id="productRatingStars">
                ★★★★★
              </span>

              <span class="rating-count" id="productRatingCount">
                4.8 (${reviews} Reviews)
              </span>

            </div>

            <div class="price-section">

              <span class="current-price">
                ₹${formatProductPrice(activeProduct.price)}
              </span>

              <span class="old-price-detail">
                ₹${formatProductPrice(oldPrice)}
              </span>

              <span class="saving-text">
                Save ₹${formatProductPrice(savingAmount)}
              </span>

            </div>

            <p class="tax-text">
              Inclusive of all taxes
            </p>

            <p class="product-description">
              ${
                activeProduct.description ||
                "Premium quality product with excellent performance, reliable build quality and a trusted EliteStore shopping experience."
              }
            </p>

            <div class="product-benefits">

              <div class="benefit-box">
                🚚 Free Delivery
              </div>

              <div class="benefit-box">
                🔄 7-Day Replacement
              </div>

              <div class="benefit-box">
                🛡️ Secure Payment
              </div>

              <div class="benefit-box">
                ✅ Genuine Product
              </div>

            </div>

            <div class="stock-row">
              ✓ In Stock — Only ${stock} item(s) available
            </div>

            <div class="quantity-section">

              <label>
                Select Quantity
              </label>

              <div class="quantity-control">

                <button
                  type="button"
                  onclick="changeProductQuantity(-1)"
                  aria-label="Decrease quantity"
                >
                  −
                </button>

                <span id="productQuantity">1</span>

                <button
                  type="button"
                  onclick="changeProductQuantity(1)"
                  aria-label="Increase quantity"
                >
                  +
                </button>

              </div>

            </div>

            <div class="product-action-buttons">

              <button
                type="button"
                class="add-cart-detail-btn"
                onclick="addSelectedProductToCart(false)"
              >
                🛒 Add to Cart
              </button>

              <button
                type="button"
                class="buy-now-detail-btn"
                onclick="addSelectedProductToCart(true)"
              >
                ⚡ Buy Now
              </button>

              <button
                type="button"
                class="wishlist-detail-btn ${wishlisted ? "saved" : ""}"
                id="detailWishlistButton"
                onclick="toggleProductWishlist()"
              >
                ${
                  wishlisted
                    ? "♥ Saved in Wishlist"
                    : "♡ Add to Wishlist"
                }
              </button>

            </div>

          </div>

        </section>
      `;

      renderProductSpecifications(activeProduct);
      renderProductReviews(activeProduct);
      renderRelatedProducts(activeProduct);
    }

    function renderProductSpecifications(product) {
      const specifications = [
        ["Product Name", product.name],
        ["Category", product.category || "General"],
        ["Brand", product.brand || "Elite"],
        ["Availability", "In Stock"],
        ["Delivery", "Free Delivery"],
        ["Return Policy", "7-Day Replacement"],
        ["Warranty", product.warranty || "1 Year"],
        ["Payment", "Secure Payment"]
      ];

      const specificationsBox =
        document.getElementById("productSpecifications");

      specificationsBox.innerHTML = specifications
        .map(specification => `
          <div class="specification-item">
            <strong>${specification[0]}</strong>
            <span>${specification[1]}</span>
          </div>
        `)
        .join("");

      document.getElementById(
        "productExtraSection"
      ).style.display = "block";
    }


    function escapeReviewHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadAllProductReviews() {
      try {
        const savedReviews = JSON.parse(
          localStorage.getItem(PRODUCT_REVIEWS_STORAGE_KEY)
        );

        return savedReviews &&
          typeof savedReviews === "object" &&
          !Array.isArray(savedReviews)
          ? savedReviews
          : {};
      } catch (error) {
        console.error("Unable to load product reviews:", error);
        return {};
      }
    }

    function getProductReviews(productId) {
      const allReviews = loadAllProductReviews();
      const reviews = allReviews[String(productId)];

      return Array.isArray(reviews) ? reviews : [];
    }

    function saveProductReviews(productId, reviews) {
      const allReviews = loadAllProductReviews();
      allReviews[String(productId)] = reviews;

      localStorage.setItem(
        PRODUCT_REVIEWS_STORAGE_KEY,
        JSON.stringify(allReviews)
      );
    }

    function createRatingStars(rating) {
      const roundedRating = Math.round(Number(rating) || 0);

      return Array.from({ length: 5 }, (_, index) =>
        index < roundedRating ? "★" : "☆"
      ).join("");
    }

    function formatReviewDate(dateValue) {
      const date = new Date(dateValue);

      if (Number.isNaN(date.getTime())) {
        return "Recently";
      }

      return date.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function calculateProductRating(product, customerReviews) {
      const baseRating = Number(product.rating || 4.8);
      const baseReviewCount = Math.max(0, Number(product.reviews) || 0);

      const customerRatingTotal = customerReviews.reduce(
        (total, review) => total + Number(review.rating || 0),
        0
      );

      const totalReviewCount = baseReviewCount + customerReviews.length;

      const averageRating = totalReviewCount > 0
        ? (
            (baseRating * baseReviewCount + customerRatingTotal) /
            totalReviewCount
          )
        : 0;

      return {
        average: Math.min(5, Math.max(0, averageRating)),
        total: totalReviewCount
      };
    }

    function updateProductRatingDisplay(product, customerReviews) {
      const ratingData = calculateProductRating(product, customerReviews);

      const productStars = document.getElementById("productRatingStars");
      const productCount = document.getElementById("productRatingCount");
      const reviewsAverage = document.getElementById("reviewsAverage");
      const reviewsSummaryStars =
        document.getElementById("reviewsSummaryStars");
      const reviewsTotal = document.getElementById("reviewsTotal");

      if (productStars) {
        productStars.textContent = createRatingStars(ratingData.average);
      }

      if (productCount) {
        productCount.textContent =
          `${ratingData.average.toFixed(1)} (${ratingData.total} Reviews)`;
      }

      if (reviewsAverage) {
        reviewsAverage.textContent = ratingData.average.toFixed(1);
      }

      if (reviewsSummaryStars) {
        reviewsSummaryStars.textContent =
          createRatingStars(ratingData.average);
      }

      if (reviewsTotal) {
        reviewsTotal.textContent =
          `${ratingData.total} review${ratingData.total === 1 ? "" : "s"}`;
      }
    }

    function setReviewRating(rating) {
      selectedReviewRating = Math.min(
        5,
        Math.max(1, Number(rating) || 1)
      );

      document
        .querySelectorAll(".review-star-button")
        .forEach(button => {
          const buttonRating = Number(button.dataset.rating);
          button.classList.toggle(
            "active",
            buttonRating <= selectedReviewRating
          );
        });

      const ratingMessage =
        document.getElementById("reviewRatingMessage");

      if (ratingMessage) {
        ratingMessage.textContent =
          `${selectedReviewRating} out of 5 stars selected.`;
      }
    }

    function renderProductReviews(product) {
      const reviewsSection = document.getElementById("reviewsSection");
      const reviewsList = document.getElementById("reviewsList");

      if (!reviewsSection || !reviewsList) {
        return;
      }

      const customerReviews = getProductReviews(product.id);

      updateProductRatingDisplay(product, customerReviews);

      if (customerReviews.length === 0) {
        reviewsList.innerHTML = `
          <div class="empty-reviews">
            <div>⭐</div>
            <strong>No customer reviews yet</strong>
            <p>Be the first person to review this product.</p>
          </div>
        `;
      } else {
        reviewsList.innerHTML = customerReviews
          .map(review => `
            <article class="review-card">
              <div class="review-card-top">
                <div>
                  <div class="review-user-name">
                    ${escapeReviewHtml(review.name || "Customer")}
                  </div>

                  <div class="review-date">
                    ${formatReviewDate(review.date)}
                  </div>
                </div>

                <div class="review-card-stars">
                  ${createRatingStars(review.rating)}
                </div>
              </div>

              <p class="review-card-text">
                ${escapeReviewHtml(review.message || "")}
              </p>
            </article>
          `)
          .join("");
      }

      reviewsSection.style.display = "block";
      prefillReviewerName();
    }

    function prefillReviewerName() {
      const reviewerName = document.getElementById("reviewerName");

      if (!reviewerName || reviewerName.value.trim()) {
        return;
      }

      try {
        const user = JSON.parse(localStorage.getItem("user"));

        if (user && typeof user === "object") {
          reviewerName.value =
            user.name ||
            user.fullName ||
            "";
        }
      } catch (error) {
        console.error("Unable to prefill reviewer name:", error);
      }
    }

    function submitProductReview(event) {
      event.preventDefault();

      if (!activeProduct) {
        return;
      }

      const reviewerName = document
        .getElementById("reviewerName")
        .value
        .trim();

      const reviewMessage = document
        .getElementById("reviewMessage")
        .value
        .trim();

      if (reviewerName.length < 2) {
        showProductToast("Please enter your name.");
        document.getElementById("reviewerName").focus();
        return;
      }

      if (selectedReviewRating < 1 || selectedReviewRating > 5) {
        showProductToast("Please select a star rating.");
        return;
      }

      if (reviewMessage.length < 5) {
        showProductToast("Please write at least 5 characters.");
        document.getElementById("reviewMessage").focus();
        return;
      }

      const reviews = getProductReviews(activeProduct.id);

      reviews.unshift({
        id: Date.now(),
        name: reviewerName,
        rating: selectedReviewRating,
        message: reviewMessage,
        date: new Date().toISOString()
      });

      saveProductReviews(activeProduct.id, reviews);

      document.getElementById("reviewMessage").value = "";
      selectedReviewRating = 0;

      document
        .querySelectorAll(".review-star-button")
        .forEach(button => button.classList.remove("active"));

      document.getElementById("reviewRatingMessage").textContent =
        "Select 1 to 5 stars.";

      renderProductReviews(activeProduct);
      showProductToast("Your review has been submitted.");
    }


    function renderRelatedProducts(product) {
      const relatedProducts = productCatalog
        .filter(item => Number(item.id) !== Number(product.id))
        .sort((first, second) => {
          const firstRelated =
            first.category === product.category ? 1 : 0;

          const secondRelated =
            second.category === product.category ? 1 : 0;

          return secondRelated - firstRelated;
        })
        .slice(0, 4);

      if (relatedProducts.length === 0) {
        return;
      }

      const relatedBox =
        document.getElementById("relatedProducts");

      relatedBox.innerHTML = relatedProducts
        .map(item => `
          <article
            class="related-card"
            onclick="openRelatedProduct(${item.id})"
          >

            <div class="related-card-image">
              <img
                src="${item.image}"
                alt="${item.name}"
                onerror="this.onerror=null; this.src='./Website-images/no-image.png';"
              >
            </div>

            <h3>${item.name}</h3>

            <p class="related-card-price">
              ₹${formatProductPrice(item.price)}
            </p>

          </article>
        `)
        .join("");

      document.getElementById(
        "relatedSection"
      ).style.display = "block";
    }

    function changeProductImage(imageSource, button) {
      const mainImage =
        document.getElementById("mainProductImage");

      if (mainImage) {
        mainImage.src = imageSource;
      }

      document
        .querySelectorAll(".thumbnail-button")
        .forEach(thumbnail => {
          thumbnail.classList.remove("active");
        });

      if (button) {
        button.classList.add("active");
      }
    }

    function changeProductQuantity(change) {
      selectedQuantity += change;

      if (selectedQuantity < 1) {
        selectedQuantity = 1;
      }

      if (selectedQuantity > 10) {
        selectedQuantity = 10;
        showProductToast(
          "Maximum 10 products can be added."
        );
      }

      const quantityBox =
        document.getElementById("productQuantity");

      if (quantityBox) {
        quantityBox.textContent = selectedQuantity;
      }
    }

    function addSelectedProductToCart(buyNow) {
      if (!activeProduct) {
        return;
      }

      const savedCart = getSavedCart();

      const existingItem = savedCart.find(
        item =>
          Number(item.id) === Number(activeProduct.id)
      );

      if (existingItem) {
        existingItem.qty =
          Math.max(1, Number(existingItem.qty) || 1) +
          selectedQuantity;
      } else {
        savedCart.push({
          ...activeProduct,
          qty: selectedQuantity
        });
      }

      localStorage.setItem(
        "cart",
        JSON.stringify(savedCart)
      );

      /*
        Existing script.js ke cart variable ko bhi update karta hai,
        jisse doosre common functions ke saath conflict nahi hoga.
      */
      if (typeof cart !== "undefined") {
        cart = savedCart;
      }

      updateProductCartCount();

      if (buyNow) {
        window.location.href = "checkout.html";
        return;
      }

      showProductToast(
        `${selectedQuantity} × ${activeProduct.name} added to cart.`
      );
    }

    function toggleProductWishlist() {
      if (!activeProduct) {
        return;
      }

      let savedWishlist = getSavedWishlist();

      const existingIndex = savedWishlist.findIndex(
        item =>
          Number(item.id) === Number(activeProduct.id)
      );

      const wishlistButton =
        document.getElementById("detailWishlistButton");

      if (existingIndex === -1) {
        savedWishlist.push(activeProduct);

        wishlistButton.classList.add("saved");
        wishlistButton.textContent =
          "♥ Saved in Wishlist";

        showProductToast(
          `${activeProduct.name} added to wishlist.`
        );
      } else {
        savedWishlist.splice(existingIndex, 1);

        wishlistButton.classList.remove("saved");
        wishlistButton.textContent =
          "♡ Add to Wishlist";

        showProductToast(
          `${activeProduct.name} removed from wishlist.`
        );
      }

      localStorage.setItem(
        "wishlist",
        JSON.stringify(savedWishlist)
      );

      if (typeof wishlist !== "undefined") {
        wishlist = savedWishlist;
      }
    }

    function openRelatedProduct(productId) {
      localStorage.setItem(
        "selectedProduct",
        String(productId)
      );

      window.location.href =
        `product.html?id=${productId}`;
    }

    function showProductNotFound() {
      document.getElementById(
        "productPageContent"
      ).innerHTML = `
        <section class="product-not-found">

          <div>📦</div>

          <h1>Product Not Found</h1>

          <p>
            This product may have been removed or the product ID is invalid.
          </p>

          <a href="index.html">
            Return to Home
          </a>

        </section>
      `;
    }

    function showProductToast(message) {
      const toast =
        document.getElementById("productToast");

      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    const reviewForm = document.getElementById("reviewForm");

    if (reviewForm) {
      reviewForm.addEventListener("submit", submitProductReview);
    }

    renderProductPage();
    updateProductCartCount();
  </script>

</body>

</html>
